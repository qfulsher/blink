        - generic [ref=e60]:
          - heading "TM1637 7-Segment Display Driver for ESP-IDF" [level=1] [ref=e61]
          - paragraph [ref=e62]: A comprehensive ESP-IDF component for controlling TM1637-based 7-segment LED displays. This driver provides full control over brightness, display content, and includes advanced features like text scrolling.
          - heading "Features" [level=2] [ref=e63]
          - list [ref=e64]:
            - listitem [ref=e65]:
              - text: ✅
              - strong [ref=e66]: Full TM1637 Protocol Implementation
              - text: "- Based on official datasheet"
            - listitem [ref=e67]:
              - text: ✅
              - strong [ref=e68]: Brightness Control
              - text: "- 8 levels (0-7) with on/off control"
            - listitem [ref=e69]:
              - text: ✅
              - strong [ref=e70]: Decimal & Hexadecimal Numbers
              - text: "- Display integers in multiple formats"
            - listitem [ref=e71]:
              - text: ✅
              - strong [ref=e72]: Alphanumeric Support
              - text: "- Display text with A-Z, 0-9, and symbols"
            - listitem [ref=e73]:
              - text: ✅
              - strong [ref=e74]: Text Scrolling
              - text: "- Blocking and non-blocking scrolling animations"
            - listitem [ref=e75]:
              - text: ✅
              - strong [ref=e76]: Thread-Safe
              - text: "- Mutex-protected operations for multi-task safety"
            - listitem [ref=e77]:
              - text: ✅
              - strong [ref=e78]: Low-Level Control
              - text: "- Direct segment manipulation available"
            - listitem [ref=e79]:
              - text: ✅
              - strong [ref=e80]: Easy Integration
              - text: "- Simple API with comprehensive examples"
          - heading "Hardware Connection" [level=2] [ref=e81]
