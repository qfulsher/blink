<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>openHatch</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main>
        <h1>openHatch</h1>
        <section class="card">
            <div class="row">
                <span class="label">LED</span>
                <span id="state" class="state state-unknown">…</span>
            </div>
            <button id="toggle" class="btn" disabled>Toggle</button>
        </section>

        <section class="card">
            <h2 class="card-title">Upload .wav</h2>
            <input type="file" id="file" class="file-input" accept=".wav,audio/wav,audio/wave,audio/x-wav">
            <button id="upload" class="btn" disabled>Upload</button>
            <p id="upload-status" class="status-text"></p>
        </section>
    </main>
    <script src="/app.js"></script>
</body>
</html>
